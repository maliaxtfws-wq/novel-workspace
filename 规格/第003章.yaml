chapter: 003
title: "鱼的代价"
summary: "陆沉9:00准时到张海明办公室。张海明当众大声训斥，核心逻辑是'你不努力所以没晋升'。陆沉被训斥时双耳发鸣、脑中闪过昨晚游鱼，决定反抗。张海明威胁后陆沉直接辞职——'好，那我不干了'。下午陆沉游荡后回到钓点，陈海带黄焖鸡找到陆沉，陈海分析现状。15:40起水面异常安静，16:00怪鱼再次撞向陆沉的鱼钩，本章完。章节主题：鱼的代价不是鱼本身，而是陆沉看见它之后，再也没法装作什么都没发生。"

