title: "红焰"
summary: "3月4日16:00怪鱼第二次撞钩，陆沉搏斗后将其钓上岸。陈海认不出这是什么鱼，陆沉冥冥中感应到这是鲤鱼，给它起名红焰。16:50两人带红焰到周老板渔具店（门面小但里面大），配置装备。周老板介绍斗鱼竞技体系：1v1v1v1混战、每选手最多4条鱼、也可能只派1条鱼（众矢之的）。19:30安置完红焰，陆沉看手机，赵鹏私信说项目没人接、张海明被总公司领导修理。陆沉正看完消息，张海明电话打来——断章。"

