chapter: 002
title: "天赋在我身上的体现就是——完全没有天赋"
summary: "陈海质问陆沉为什么不回消息，陆沉不想拖累搭档拒绝组队，被陈海强行拽去钓鱼。三小时无口，临走前红鱼上钩，搏斗后脱钩逃逸。陆沉手被割伤，自嘲'钩得牢吗'。红鱼的行为异常——它撞向了他的钩，没有逃，像是在等他。凌晨回家路上，钉钉消息爆炸——张海明在群里追命连环call。睡前刷到陈海朋友圈，两人的友情岁月。"

