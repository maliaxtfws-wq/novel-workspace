fish_system:
  "本章鱼色体系首次揭示":
    - "白色：罗非鱼等常见鱼，感知为淡淡的白色薄雾"
    - "红色：本章出现的命运之鱼，不是普通的鱼，像凝固的血——强烈的存在感"
    - "鱼的大小与力量不一定成正比，但鱼的'灵性'与颜色深度相关"
    - "红鱼的特征：流线型身形、鳞片反红光、力量像鱼雷"
    - "关键悬念：为什么这条鱼会撞向他的鱼钩？为什么它没有跑？——本书最大谜团，暂不揭示"

parent_fishing_history:
  "父亲与陆沉的钓鱼史（需在本章或回忆中呈现）":
    - "初中假期：父亲开始带陆沉去钓鱼，作为放松"
    - "高中假期：经常去，父亲教他绑钩、调漂、读漂"
    - "高三毕业暑假：最后一次父子共同钓鱼，那天王海明的尾货卖得特别好"
    - "之后：父亲彻底沉迷钓鱼，渔具店关门，钓鱼俱乐部破产"
    - "陆沉从此再没钓过鱼，直到周二被陈海强行拽去"
  "关键细节":
    - "父亲钓鱼的执念与陆沉现在对蓝鲸杯的执念形成镜像"
    - "母亲反对钓鱼的态度：'鱼是祸根'——但陆沉不知道父亲破产的真实原因"

